<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="theme-switcher">
            <div class="theme-btn" data-theme="light" style="background: white;"></div>
            <div class="theme-btn" data-theme="dark" style="background: #333;"></div>
            <div class="theme-btn" data-theme="neon-purple" style="background: #bc13fe;"></div>
        </div>

        <h1>Task Manager</h1>

        <div id="auth-section">
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            <button id="login-btn" class="primary-btn">Login</button>
            <button id="register-btn" class="secondary-btn">Register</button>
        </div>

        <div id="task-section" style="display:none;">
            <button id="open-modal-btn" class="add-btn">+ Create New Task</button>
            <ul id="task-list"></ul>
            <button id="logout-btn" class="logout-btn">Logout</button>
        </div>
    </div>

    <div id="taskModal" class="modal">
        <div class="modal-content">
            <h2>Add New Task</h2>
            <input type="text" id="task-title" placeholder="What needs to be done?">
            <textarea id="task-desc" placeholder="Add a description..."></textarea>

            <div class="modal-field">
                <label>Deadline:</label>
                <input type="datetime-local" id="task-deadline">
            </div>

            <div class="modal-buttons">
                <button id="save-task-btn" class="primary-btn">Save Task</button>
                <button id="cancel-modal-btn" class="cancel-btn">Cancel</button>
            </div>
        </div>
    </div>

    <script src="./script.js"></script>
</body>
</html>

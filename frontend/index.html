<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="theme-switcher">
            <div class="theme-btn" style="background: white;" onclick="setTheme('light')"></div>
            <div class="theme-btn" style="background: #333;" onclick="setTheme('dark')"></div>
            <div class="theme-btn" style="background: #bc13fe;" onclick="setTheme('neon-purple')"></div>
        </div>
        
        <h1>Task Manager</h1>
        
        <div id="auth-section">
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            <button onclick="login()" class="primary-btn">Login</button>
            <button onclick="register()" class="secondary-btn">Register</button>
        </div>

        <div id="task-section" style="display:none;">
            <button onclick="openModal()" class="add-btn">+ Create New Task</button>
            <ul id="task-list"></ul>
            <button onclick="logout()" class="logout-btn">Logout</button>
        </div>
    </div>

    <div id="taskModal" class="modal">
        <div class="modal-content">
            <h2>Add New Task</h2>
            <input type="text" id="task-title" placeholder="What needs to be done?">
            <textarea id="task-desc" placeholder="Add a description..."></textarea>
            
            <div class="modal-field">
                <label>Deadline:</label>
                <input type="datetime-local" id="task-deadline">
            </div>
            
            <div class="modal-buttons">
                <button onclick="createTask()" class="primary-btn">Save Task</button>
                <button onclick="closeModal()" class="cancel-btn">Cancel</button>
            </div>
        </div>
    </div>

    <script src="./script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="theme-switcher">
            <div class="theme-btn" data-theme="light" style="background: white;"></div>
            <div class="theme-btn" data-theme="dark" style="background: #333;"></div>
            <div class="theme-btn" data-theme="neon-purple" style="background: #bc13fe;"></div>
        </div>

        <h1>Task Manager</h1>

        <div id="auth-section">
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            <button id="login-btn" class="primary-btn">Login</button>
            <button id="register-btn" class="secondary-btn">Register</button>
        </div>

        <div id="task-section" style="display:none;">
            <button id="open-modal-btn" class="add-btn">+ Create New Task</button>

            <!-- Column header row -->
            <div class="task-header-row">
                <span class="col-num">#</span>
                <span class="col-title">Title</span>
                <span class="col-info"></span>
                <span class="col-desc">Description</span>
                <span class="col-created">Created</span>
                <span class="col-deadline">Deadline</span>
                <span class="col-priority">Priority</span>
                <span class="col-del"></span>
                <span class="col-check">Done</span>
            </div>

            <ul id="task-list"></ul>
            <button id="logout-btn" class="logout-btn">Logout</button>
        </div>
    </div>

    <!-- MODAL -->
    <div id="taskModal" class="modal">
        <div class="modal-content">
            <h2>New Task</h2>

            <div class="modal-field">
                <label>Title</label>
                <input type="text" id="task-title" placeholder="What needs to be done?">
            </div>

            <div class="modal-field">
                <label>Description</label>
                <textarea id="task-desc" placeholder="Add a description..."></textarea>
            </div>

            <div class="modal-field">
                <label>Created at</label>
                <input type="text" id="task-created-display" readonly style="opacity:0.6; cursor:default;">
            </div>

            <div class="modal-field">
                <label>Deadline</label>
                <input type="datetime-local" id="task-deadline">
            </div>

            <div class="modal-field">
                <label>Priority</label>
                <select id="task-priority">
                    <option value="low">Low</option>
                    <option value="medium" selected>Medium</option>
                    <option value="high">High</option>
                </select>
            </div>

            <div class="modal-buttons">
                <button id="save-task-btn" class="primary-btn">Save Task</button>
                <button id="cancel-modal-btn" class="cancel-btn">Cancel</button>
            </div>
        </div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
